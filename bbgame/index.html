<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Diamond Dynasty Sim — Baseball Simulation</title>
<link rel="stylesheet" href="css/styles.css" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='28' fill='%23f9f9f9' stroke='%23c8102e' stroke-width='3'/%3E%3Cpath d='M14 22 Q32 14 50 22' stroke='%23c8102e' stroke-width='2' fill='none'/%3E%3Cpath d='M14 42 Q32 50 50 42' stroke='%23c8102e' stroke-width='2' fill='none'/%3E%3C/svg%3E" />
</head>
<body>
<div id="splash" class="splash">
  <div class="splash-inner">
    <div class="splash-logo"></div>
    <h1>DIAMOND DYNASTY</h1>
    <p class="tagline">Pure Baseball Simulation</p>
    <div class="splash-loader"><div></div></div>
  </div>
</div>

<div id="app" class="app hidden">
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark"></div>
      <div>
        <div class="brand-title">DIAMOND DYNASTY</div>
        <div class="brand-sub" id="season-indicator">Season — / —</div>
      </div>
    </div>
    <nav class="nav">
      <button data-view="dashboard" class="nav-btn active">Dashboard</button>
      <button data-view="teams" class="nav-btn">Teams</button>
      <button data-view="standings" class="nav-btn">Standings</button>
      <button data-view="schedule" class="nav-btn">Schedule</button>
      <button data-view="leaders" class="nav-btn">Leaders</button>
      <button data-view="freeagency" class="nav-btn">Free Agency</button>
      <button data-view="draft" class="nav-btn">Draft</button>
      <button data-view="playoffs" class="nav-btn">Playoffs</button>
      <button data-view="history" class="nav-btn">History</button>
      <button data-view="settings" class="nav-btn">Settings</button>
    </nav>
    <div class="topbar-actions">
      <button id="btn-sim-day" class="btn primary">Sim Day</button>
      <button id="btn-sim-week" class="btn">Sim Week</button>
      <button id="btn-sim-month" class="btn">Sim Month</button>
    </div>
  </header>

  <main id="view" class="view"></main>

  <div id="toast" class="toast"></div>
  <div id="modal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-head">
        <div id="modal-title">Title</div>
        <button id="modal-close">×</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <div id="game-overlay" class="game-overlay hidden">
    <div class="game-card">
      <div class="game-head">
        <div class="game-title" id="game-title">Game</div>
        <button id="game-close">×</button>
      </div>
      <div class="game-scoreline">
        <div class="score-team away">
          <div class="score-logo" id="away-logo"></div>
          <div class="score-name" id="away-name">Away</div>
          <div class="score-num" id="away-runs">0</div>
        </div>
        <div class="game-mid">
          <div class="inning" id="inning-label">Top 1st</div>
          <div class="count" id="count-label">0-0, 0 out</div>
        </div>
        <div class="score-team home">
          <div class="score-num" id="home-runs">0</div>
          <div class="score-name" id="home-name">Home</div>
          <div class="score-logo" id="home-logo"></div>
        </div>
      </div>
      <div class="game-linescore" id="linescore"></div>
      <div class="game-feed" id="play-feed"></div>
      <div class="game-actions">
        <button id="game-play" class="btn primary">Pause</button>
        <button id="game-fast" class="btn">Fast</button>
        <button id="game-finish" class="btn">Finish Game</button>
      </div>
    </div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/util.js"></script>
<script src="js/generator.js"></script>
<script src="js/storage.js"></script>
<script src="js/league.js"></script>
<script src="js/sim.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>
</body>
</html>
